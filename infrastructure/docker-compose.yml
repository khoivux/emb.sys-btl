version: '3.8'

services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker
    ports:
      - "1883:1883"   # MQTT protocol
      - "9001:9001"   # WebSockets protocol
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: drone_db
    environment:
      POSTGRES_DB: drone_system
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Optional: pgAdmin for easy DB management
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_drone
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@drone.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
